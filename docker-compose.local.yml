services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: restaurant_training
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d restaurant_training"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/restaurant_training
      JWT_SECRET_KEY: local_dev_secret_change_me
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      BOOTSTRAP_SUPERADMIN_EMAIL: owner@example.com
      BOOTSTRAP_SUPERADMIN_PASSWORD: change_me_please
      CONTENT_EXPORT_ROOT: /import/content_export
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - ./content_export:/import/content_export:ro
      - ./backend/media_uploads:/app/media_uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.local
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pg_data_local:
