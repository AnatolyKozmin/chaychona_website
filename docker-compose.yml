services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: restaurant_training
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d restaurant_training"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/restaurant_training
      JWT_SECRET_KEY: CHANGE_ME_TO_LONG_RANDOM_SECRET
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      BOOTSTRAP_SUPERADMIN_EMAIL: owner@example.com
      BOOTSTRAP_SUPERADMIN_PASSWORD: CHANGE_ME_PLEASE
      CONTENT_EXPORT_ROOT: /import/content_export
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./content_export:/import/content_export:ro
      - ./backend/media_uploads:/app/media_uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://194.87.140.241:8000/api/v1
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pg_data:
